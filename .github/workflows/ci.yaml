name: Tests

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["py311", "py312", "py313", "py314"]
        # macos-15-large is an intel runner, macos-14 is an arm64 runner
        platform: [ubuntu-latest, ubuntu-22.04-arm, windows-latest, macos-15-large, macos-14]

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0 # required for version resolution

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.0
        with:
          pixi-version: v0.49.0
          cache: false
          environments: test-${{ matrix.python-version }}

      - name: List installed packages
        run: pixi run -e test-${{ matrix.python-version }} uv pip list

      - name: Run tests
        run: pixi run -e test-${{ matrix.python-version }} run-tests

      - uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  test-zarr:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        zarr-version: ["312", "313", "main"]

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0 # required for version resolution

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.0
        with:
          pixi-version: v0.49.0
          cache: false

      - name: List installed packages
        shell: "bash -l {0}"
        run: pixi run ls-deps-${{matrix.zarr-version}}

      - name: Run tests with Zarr ${{ matrix.zarr-version }}
        shell: "bash -l {0}"
        run: pixi run test-zarr-${{ matrix.zarr-version }}

      - uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
